<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mtnlabs.ai — Plan your next mountain adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #22d3ee, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 1.25rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(34, 211, 238, 0.4);
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      color: #475569;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>mtnlabs.ai</h1>
    <p class="tagline">AI-powered route planning for Norwegian mountains</p>
    <a href="https://plan.mtnlabs.ai" class="cta">Open the planner</a>
  </div>
  <div class="footer">mtnlabs 2026</div>
</body>
</html>
